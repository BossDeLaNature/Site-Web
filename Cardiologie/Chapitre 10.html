<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Tabasser la Cardio - Mode Aléatoire</title>
    <link rel="stylesheet" href="css/bootstrap.min.css">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.4.120/pdf.min.js"></script>
    <style>
        body { background-color: #953553; color: white; font-family: sans-serif; }
        .quiz-card { background-color: #6c757d; border-radius: 15px; padding: 20px; margin-bottom: 20px; box-shadow: 0 10px 30px rgba(0,0,0,0.5); }
        #pdf-wrapper { background: #444; border-radius: 10px; overflow: hidden; position: relative; min-height: 500px; display: none; }
        canvas { width: 100% !important; height: auto !important; }
        .btn-group-custom { display: flex; gap: 8px; justify-content: center; margin-top: 15px; flex-wrap: wrap; }
        #justif-container { background: rgba(0,0,0,0.4); padding: 15px; border-radius: 10px; margin-top: 15px; display: none; border-left: 5px solid #2ecc71; }
        .badge-numero { font-size: 1.1rem; background: #2c3e50; }
    </style>
</head>
<body>

<div class="container py-3">
    <div class="text-center mb-3">
        <video controls width="100%" style="max-width: 250px; border-radius: 10px;">
            <source src="media/Criminel.mp4" type="video/mp4">
        </video>
    </div>

    <div class="row">
        <div class="col-lg-5">
            <div class="quiz-card">
                <div class="d-flex justify-content-between align-items-center mb-3">
                    <span id="question-number" class="badge badge-numero">Question --</span>
                    <button class="btn btn-sm btn-light" id="btn-menu">☰ Liste</button>
                </div>

                <div id="quiz-content" class="text-center">
                    <h3 id="proposition-text" class="mb-4" style="min-height: 100px;">Chargement du syllabus...</h3>
                    <div class="btn-group-custom">
                        <button class="btn btn-success btn-lg px-4" onclick="handleResponse(true)">VRAI</button>
                        <button class="btn btn-danger btn-lg px-4" onclick="handleResponse(false)">FAUX</button>
                    </div>
                </div>

                <div id="feedback" class="text-center mt-3"></div>
                <div id="justif-container"></div>

                <div class="btn-group-custom mt-4">
                    <button class="btn btn-outline-light btn-sm" id="prev-btn">⬅️ Préc.</button>
                    <button class="btn btn-warning btn-sm fw-bold" id="random-btn">🎲 Aléatoire</button>
                    <button class="btn btn-outline-light btn-sm" id="next-btn">Suiv. ➡️</button>
                </div>
            </div>
        </div>

        <div class="col-lg-7">
            <div id="pdf-placeholder" class="text-center p-5 border rounded" style="background: rgba(255,255,255,0.05); border-style: dashed !important;">
                <p>Réponds pour afficher la page correspondante du PDF.</p>
            </div>
            <div id="pdf-wrapper">
                <canvas id="pdf-canvas"></canvas>
            </div>
        </div>
    </div>
</div>

<div class="modal fade" id="menuModal" tabindex="-1">
    <div class="modal-dialog modal-dialog-scrollable">
        <div class="modal-content text-dark">
            <div class="modal-header"><h5>Choisir une question</h5><button type="button" class="btn-close" data-bs-dismiss="modal"></button></div>
            <div class="modal-body" id="menu-list"></div>
        </div>
    </div>
</div>

<script src="js/bootstrap.bundle.min.js"></script>
<script>
    pdfjsLib.GlobalWorkerOptions.workerSrc = 'https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.4.120/pdf.worker.min.js';

    let quizData = [];
    let currentIdx = 0;
    let pdfDoc = null;
    const pdfPath = 'pdf/Syllab cardio_10.pdf';

    const propEl = document.getElementById('proposition-text');
    const qNumEl = document.getElementById('question-number');
    const feedbackEl = document.getElementById('feedback');
    const justifEl = document.getElementById('justif-container');
    const pdfWrapper = document.getElementById('pdf-wrapper');
    const pdfPlaceholder = document.getElementById('pdf-placeholder');

    // Chargement initial
    Promise.all([
        fetch('Excel/cardio_10.json').then(r => r.json()),
        pdfjsLib.getDocument(pdfPath).promise
    ]).then(([data, pdf]) => {
        quizData = data;
        pdfDoc = pdf;
        showQuestion(0);
        initMenu();
    }).catch(err => propEl.textContent = "Erreur : Fichiers manquants.");

    function showQuestion(idx) {
        currentIdx = idx;
        const q = quizData[idx];
        
        propEl.textContent = q.Proposition;
        qNumEl.textContent = `Question ${q.Numero}`;
        feedbackEl.innerHTML = '';
        justifEl.style.display = 'none';
        pdfWrapper.style.display = 'none';
        pdfPlaceholder.style.display = 'block';
        
        window.scrollTo(0, 0);
    }

    async function handleResponse(choice) {
        const q = quizData[currentIdx];
        const isCorrect = choice === q.Reponse;
        
        new Audio(isCorrect ? 'media/sound/Correct.mp3' : 'media/sound/Wrong.mp3').play();
        feedbackEl.innerHTML = `<h2 style="color:${isCorrect?'#2ecc71':'#e74c3c'}">${isCorrect?'CORRECT !':'ERREUR'}</h2>`;
        
        justifEl.innerHTML = `<strong>Justification :</strong> ${q.Justification}`;
        justifEl.style.display = 'block';

        if (q.Page) {
            pdfPlaceholder.style.display = 'none';
            pdfWrapper.style.display = 'block';
            renderPDFPage(parseInt(q.Page));
        }
    }

    async function renderPDFPage(num) {
        const page = await pdfDoc.getPage(num);
        const canvas = document.getElementById('pdf-canvas');
        const context = canvas.getContext('2d');
        const viewport = page.getViewport({ scale: 1.5 });
        canvas.height = viewport.height;
        canvas.width = viewport.width;
        await page.render({ canvasContext: context, viewport: viewport }).promise;
    }

    // FONCTION ALÉATOIRE
    function nextRandom() {
        let newIdx;
        do {
            newIdx = Math.floor(Math.random() * quizData.length);
        } while (newIdx === currentIdx && quizData.length > 1);
        showQuestion(newIdx);
    }

    // Navigation
    document.getElementById('random-btn').onclick = nextRandom;
    document.getElementById('next-btn').onclick = () => { if(currentIdx < quizData.length-1) showQuestion(currentIdx+1); };
    document.getElementById('prev-btn').onclick = () => { if(currentIdx > 0) showQuestion(currentIdx-1); };

    function initMenu() {
        const menuModal = new bootstrap.Modal(document.getElementById('menuModal'));
        document.getElementById('btn-menu').onclick = () => {
            const list = document.getElementById('menu-list');
            list.innerHTML = '';
            quizData.forEach((q, i) => {
                let b = document.createElement('button');
                b.className = 'btn btn-outline-secondary w-100 mb-1 text-start';
                b.textContent = `Q${q.Numero}: ${q.Proposition.substring(0, 30)}...`;
                b.onclick = () => { showQuestion(i); menuModal.hide(); };
                list.appendChild(b);
            });
            menuModal.show();
        };
    }
</script>
</body>
</html>
