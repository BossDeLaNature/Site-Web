<!DOCTYPE html>
<html lang="fr" dir="ltr">
<head>
    <meta charset="UTF-8">
    <title>Objectif : Tabasser Cardiologie</title>
    <link rel="stylesheet" href="css/bootstrap.min.css">
    <link rel="stylesheet" href="css/style.css">
    <style>
        body { background-color: #953553; color: white; }
        .space { height: 20px; }
        #pdf-viewer {
            border: none;
            border-radius: 10px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.3);
            background-color: white;
        }
        .quiz-card {
            background-color: #6c757d !important;
            min-height: 600px;
        }
        button { margin: 5px; }
    </style>
</head>
<body>

    <div class="container space"></div>

    <div class="container text-center mb-4">
        <div class="row justify-content-center">
            <video controls width="400">
                <source src="media/Criminel.mp4" type="video/mp4" />
            </video>
        </div>
    </div>

    <div class="container">
        <div class="dropdown mb-3">
            <button class="btn btn-dark dropdown-toggle" type="button" id="dropdownMenuButton" data-bs-toggle="dropdown">
                Choix des questions
            </button>
            <div class="dropdown-menu" id="menu-container"></div>
        </div>

        <div class="row">
            <div class="col-md-5">
                <div class="container p-4 mb-2 quiz-card rounded">
                    <img id="quizImage" src="" alt="" class="img-fluid mb-4 rounded shadow" style="max-height: 200px;">

                    <div id="quiz-container">
                        </div>

                    <hr>
                    <div id="reponse-container"></div>
                    <div id="justif-container" class="mt-3 p-2 bg-dark rounded" style="display:none;"></div>

                    <div class="mt-4">
                        <button id="previous-question" class="btn btn-outline-light">Précédente</button>
                        <button id="next-question" class="btn btn-outline-light">Suivante</button>
                    </div>
                </div>
            </div>

            <div class="col-md-7">
                <div id="pdf-placeholder" class="text-center p-5 border rounded" style="background: rgba(0,0,0,0.2);">
                    <h4>Réponds pour voir la preuve dans le syllabus</h4>
                </div>
                <div id="pdf-container" style="display: none; height: 800px;">
                    <iframe id="pdf-viewer" src="" width="100%" height="100%"></iframe>
                </div>
            </div>
        </div>
    </div>

    <script src="js/bootstrap.bundle.min.js"></script>
    <script>
        let quizData = [];
        let currentQuestionIndex = 0;

        const quizImage = document.getElementById("quizImage");
        const pdfContainer = document.getElementById("pdf-container");
        const pdfPlaceholder = document.getElementById("pdf-placeholder");
        const pdfViewer = document.getElementById("pdf-viewer");
        const justifContainer = document.getElementById("justif-container");
        const reponseContainer = document.getElementById("reponse-container");

        // 1. Charger le JSON
        fetch('Excel/cardio_4.json')
            .then(response => response.json())
            .then(data => {
                quizData = data;
                showQuestion(currentQuestionIndex);
            })
            .catch(error => console.error('Erreur chargement JSON:', error));

        // 2. Afficher la question
        function showQuestion(index) {
            resetDisplay();
            const q = quizData[index];

            // Image de la question (si elle existe)
            quizImage.src = q.image || "";

            const quizContainer = document.getElementById('quiz-container');
            quizContainer.innerHTML = `
                <h5>Question ${q.Numero}</h5>
                <h2 class="mb-4">${q.Proposition}</h2>
                <button class="btn btn-success btn-lg" onclick="checkAnswer(true)">Vrai</button>
                <button class="btn btn-danger btn-lg" onclick="checkAnswer(false)">Faux</button>
            `;
        }

        // 3. Vérifier la réponse
        function checkAnswer(selected) {
            const q = quizData[currentQuestionIndex];
            reponseContainer.innerHTML = '';

            // Son et Message
            if (selected === q.Reponse) {
                new Audio('media/sound/Correct.mp3').play();
                reponseContainer.innerHTML = '<h3 class="text-success">Correct :)</h3>';
            } else {
                new Audio('media/sound/Wrong.mp3').play();
                reponseContainer.innerHTML = '<h3 class="text-warning">Dommage :(</h3>';
            }

            // Afficher Justification
            justifContainer.style.display = 'block';
            justifContainer.innerHTML = `<strong>Justification :</strong> ${q.Justification}`;

            // Afficher le PDF à la bonne page
            if (q.Page) {
                pdfPlaceholder.style.display = 'none';
                pdfContainer.style.display = 'block';
                pdfViewer.src = `pdf/Syllab cardio_4.pdf#page=${q.Page}`;
            }
        }

        // 4. Nettoyer l'écran entre deux questions
        function resetDisplay() {
            reponseContainer.innerHTML = '';
            justifContainer.style.display = 'none';
            pdfContainer.style.display = 'none';
            pdfPlaceholder.style.display = 'block';
            pdfViewer.src = '';
        }

        // 5. Navigation
        document.getElementById('next-question').addEventListener('click', () => {
            if (currentQuestionIndex + 1 < quizData.length) {
                currentQuestionIndex++;
                showQuestion(currentQuestionIndex);
            }
        });

        document.getElementById('previous-question').addEventListener('click', () => {
            if (currentQuestionIndex > 0) {
                currentQuestionIndex--;
                showQuestion(currentQuestionIndex);
            }
        });

        // 6. Menu déroulant
        function Menuderoulant() {
            const container = document.getElementById('menu-container');
            container.innerHTML = '';
            quizData.forEach((q, idx) => {
                const btn = document.createElement('button');
                btn.className = 'dropdown-item';
                btn.textContent = `Question ${q.Numero}`;
                btn.onclick = () => { currentQuestionIndex = idx; showQuestion(idx); };
                container.appendChild(btn);
            });
        }

        document.getElementById("dropdownMenuButton").addEventListener('click', Menuderoulant);
    </script>
</body>
</html>
